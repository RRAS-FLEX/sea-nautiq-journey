[build]
  command = "npm run build"
  publish = "dist"
  # If you later migrate server endpoints to Netlify Functions, point functions to a folder like "netlify/functions"
  # functions = "netlify/functions"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true

[context.production.environment]
# Recommended: set these in the Netlify UI (Site settings → Build & deploy → Environment)
# VITE_API_BASE_URL = "https://api.yoursite.com"
